name: Javascript CI
# Can determine as array
on: [push, pull_request]
jobs:
  build:
    # runs-on: windows-latest
    # Must determine matrix context if strategy matrix is determined
    runs-on: ${{ matrix }}   
    # Metrix 
    # []
    # In this cases it will execute 4 times in 4 server
    # Cases:1 ubuntu 22.x, ubuntu 26.x, window 22.x, window 26.x
    strategy:
      matrix: 
        node-version: [22.x, 26.x]
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          repository: ${{ github.repository }}
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Build Project
        run: |
          npm ci
          npm run build --if-present
      - name: Test Project
        run: npm test
